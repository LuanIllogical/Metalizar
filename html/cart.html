<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<link rel="stylesheet" href="styles.css">

<style>
/* CART STYLES */
.cart-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: white;
  margin: 1rem;
  padding: 1rem;
  border-radius: 10px;
  width: 80%;
}

.cart-img {
  width: 120px;
  border-radius: 5px;
}

.cart-info {
  text-align: left;
}

.remove-btn {
  background: #e74c3c;
  color: white;
  border: none;
  padding: 8px;
  cursor: pointer;
  margin-top: 10px;
}

input {
  margin: 1rem;
}
</style>
</head>

<body>

<h1>Carrinho</h1>

<div id="cartItems" class="cart-container"></div>

<h2>Endereço</h2>
<input type="text" id="address" placeholder="Digite seu endereço">

<h2>Frete</h2>
<p id="shipping"></p>

<h2>Total</h2>
<p id="total"></p>

<button id="buy">Finalizar Compra</button>

<script>
// Load cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartItemsDiv = document.getElementById("cartItems");

const priceTable = {
    aluminum: 40,
    bronze: 60,
    gold: 80
};

// Render cart
function renderCart() {
    cartItemsDiv.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        cartItemsDiv.innerHTML = "<p>Seu carrinho está vazio.</p>";
    }

    cart.forEach((item, index) => {
        const price = priceTable[item.metal] || 50;
        total += price;

        const div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
            <img src="${item.image}" class="cart-img">

            <div class="cart-info">
                <p><strong>Metal:</strong> ${item.metal}</p>
                <p><strong>Tamanho:</strong> ${item.width} x ${item.height}</p>
                <p><strong>Preço:</strong> R$ ${price}</p>

                <button class="remove-btn" data-index="${index}">
                    Remover
                </button>
            </div>
        `;

        cartItemsDiv.appendChild(div);
    });

    const shipping = cart.length * 10;
    const finalTotal = total + shipping;

    document.getElementById("shipping").innerText = "R$ " + shipping;
    document.getElementById("total").innerText = "R$ " + finalTotal;

    attachRemoveEvents();
}

// Remove item
function attachRemoveEvents() {
    document.querySelectorAll(".remove-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const index = btn.dataset.index;

            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));

            renderCart();
        });
    });
}

// Purchase
document.getElementById("buy").addEventListener("click", () => {
    const address = document.getElementById("address").value;

    if (!address) {
        alert("Digite um endereço!");
        return;
    }

    if(cart.length === 0){
        alert("Carrinho vazio!");
        return;
    }

    const order = {
        items: cart,
        address: address,
        date: new Date().toLocaleString()
    };

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.push(order);

    localStorage.setItem("orders", JSON.stringify(orders));

    // Clear cart
    localStorage.removeItem("cart");

    alert("Compra realizada com sucesso!");

    window.location.href = "galeria.html";
});

// Init
renderCart();

</script>

</body>
</html>
