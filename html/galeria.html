<h1 style="color: white">Galeria de Pedidos</h1>

<div id="gallery"></div>

<script>
const gallery = document.getElementById("gallery");
const orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.forEach(order => {
    const orderDiv = document.createElement("div");

    orderDiv.innerHTML = `
        <h3 style="color: white">Pedido - ${order.date}</h3>
        <p style="color: white">Endereço: ${order.address}</p>
    `;

    order.items.forEach(item => {
        const img = document.createElement("img");
        img.src = item.image;
        img.width = 150;
        orderDiv.appendChild(img);
    });

    orderDiv.innerHTML += "<hr>";
    gallery.appendChild(orderDiv);
});
</script>
<script src="animations.js"></script>
</body>
</html>
